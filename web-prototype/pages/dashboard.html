<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="DealHunt Dashboard – Find, filter and hunt the best deals." />
  <title>Dashboard – DealHunt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/theme.css" />
  <link rel="stylesheet" href="../css/dashboard.css" />
</head>
<body>

  <!-- ── NAVBAR ── -->
  <header class="navbar" id="navbar">
    <div class="navbar-inner">

      <!-- Sidebar toggle (mobile + collapse) -->
      <button class="nav-sidebar-toggle" id="sidebar-toggle" aria-label="Toggle sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

      <a href="#" class="nav-logo">
        <img src="../assets/images/logo.png" alt="DealHunt" class="nav-logo-img"
          onerror="this.style.display='none';this.nextElementSibling.style.display='block';" />
        <span class="nav-wordmark" style="display:none;">DealHunt</span>
      </a>

      <div class="nav-search-wrap">
        <div class="nav-search-box">
          <svg class="nav-search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="global-search" class="nav-search-input"
            placeholder="Search deals, products, categories…" autocomplete="off" />
          <button class="nav-search-clear" id="search-clear" aria-label="Clear" style="display:none;">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
              <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
            </svg>
          </button>
        </div>
      </div>

      <div class="nav-actions">
        <!-- Dark/Light toggle -->
        <button class="nav-icon-btn" data-theme-toggle aria-label="Toggle theme" onclick="DealHuntTheme.toggle()">
          <svg class="icon-sun" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round" style="display:none;">
            <circle cx="12" cy="12" r="5"/>
            <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
            <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
            <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
          </svg>
          <svg class="icon-moon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none"
            stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
          </svg>
        </button>
        <!-- Notifications -->
        <button class="nav-icon-btn" aria-label="Notifications">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"/>
          </svg>
          <span class="notif-badge">3</span>
        </button>
        <div class="nav-avatar" id="nav-avatar">SK</div>
      </div>

    </div>
  </header>

  <!-- ── PAGE BODY ── -->
  <div class="page-body" id="page-body">

    <!-- ── LEFT SIDEBAR ── -->
    <aside class="sidebar" id="sidebar">

      <!-- Collapse button -->
      <button class="sidebar-collapse-btn" id="sidebar-collapse" aria-label="Collapse sidebar">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>

      <div class="sidebar-inner">

        <!-- ── Navigation ── -->
        <nav class="sidebar-nav" aria-label="Main navigation">
          <p class="sidebar-section-label">Navigation</p>
          <ul class="nav-list">
            <li>
              <a href="dashboard.html" class="nav-item active" id="nav-dashboard">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
                <span>Dashboard</span>
              </a>
            </li>
            <li>
              <a href="#" class="nav-item" id="nav-profile">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span>Profile</span>
              </a>
            </li>
            <li>
              <a href="#" class="nav-item" id="nav-waitlist">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
                <span>Waitlist / Orders</span>
                <span class="nav-badge">2</span>
              </a>
            </li>
            <li>
              <a href="#" class="nav-item" id="nav-offers">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M12 2L2 7l10 5 10-5-10-5z"/><path d="M2 17l10 5 10-5"/><path d="M2 12l10 5 10-5"/></svg>
                <span>Offers &amp; Deals</span>
                <span class="nav-badge hot">5</span>
              </a>
            </li>
            <li>
              <a href="#" class="nav-item" id="nav-history">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                <span>History</span>
              </a>
            </li>
          </ul>
        </nav>

        <div class="sidebar-divider"></div>

        <!-- ── Filters ── -->
        <div class="sidebar-filters">
          <p class="sidebar-section-label">Filters</p>

          <!-- Category -->
          <div class="filter-group">
            <button class="filter-group-header" aria-expanded="true" data-target="fc-category">
              <span>Category</span>
              <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="filter-group-body" id="fc-category">
              <div class="pill-group" id="filter-category">
                <button class="pill active" data-value="all">All</button>
                <button class="pill" data-value="electronics">Electronics</button>
                <button class="pill" data-value="fashion">Fashion</button>
                <button class="pill" data-value="beauty">Beauty</button>
                <button class="pill" data-value="toys">Toys</button>
                <button class="pill" data-value="jewelry">Jewelry</button>
              </div>
            </div>
          </div>

          <!-- Dynamic sub-filters -->
          <div class="filter-group" id="sub-filter-group" style="display:none;">
            <button class="filter-group-header" aria-expanded="true" data-target="fc-sub">
              <span id="sub-filter-label">Sub-filters</span>
              <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="filter-group-body" id="fc-sub">
              <div class="pill-group" id="filter-sub"></div>
            </div>
          </div>

          <!-- Price Range -->
          <div class="filter-group">
            <button class="filter-group-header" aria-expanded="true" data-target="fc-price">
              <span>Price Range</span>
              <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="filter-group-body" id="fc-price">
              <div class="price-range-list" id="filter-price">
                <label class="check-item">
                  <input type="radio" name="price" class="filter-price-radio" value="0-500" />
                  <span class="checkmark"></span>Under ₹500
                </label>
                <label class="check-item">
                  <input type="radio" name="price" class="filter-price-radio" value="500-2000" />
                  <span class="checkmark"></span>₹500 – ₹2,000
                </label>
                <label class="check-item">
                  <input type="radio" name="price" class="filter-price-radio" value="2000-10000" />
                  <span class="checkmark"></span>₹2,000 – ₹10,000
                </label>
                <label class="check-item">
                  <input type="radio" name="price" class="filter-price-radio" value="10000-999999" />
                  <span class="checkmark"></span>Above ₹10,000
                </label>
              </div>
            </div>
          </div>

          <!-- Discount -->
          <div class="filter-group">
            <button class="filter-group-header" aria-expanded="false" data-target="fc-discount">
              <span>Min. Discount</span>
              <svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="filter-group-body collapsed" id="fc-discount">
              <label class="check-item"><input type="radio" name="discount" class="filter-discount" value="0"/><span class="checkmark"></span>Any Discount</label>
              <label class="check-item"><input type="radio" name="discount" class="filter-discount" value="20"/><span class="checkmark"></span>20% &amp; above</label>
              <label class="check-item"><input type="radio" name="discount" class="filter-discount" value="40"/><span class="checkmark"></span>40% &amp; above</label>
              <label class="check-item"><input type="radio" name="discount" class="filter-discount" value="60"/><span class="checkmark"></span>60% &amp; above</label>
            </div>
          </div>

          <div class="filter-actions">
            <button class="btn-reset" id="btn-reset-filters">Reset Filters</button>
          </div>
        </div>

      </div>
    </aside>

    <!-- Sidebar hover zone (shows when collapsed) -->
    <div class="sidebar-hover-zone" id="sidebar-hover-zone"></div>

    <!-- ── MAIN CONTENT ── -->
    <main class="main-content" id="main-content">

      <div class="main-header">
        <div>
          <h1 class="main-title">Today's Deals</h1>
          <p class="results-count" id="results-count">Showing 9 deals</p>
        </div>
        <div class="sort-wrap">
          <label for="sort-select" class="sort-label">Sort by</label>
          <select id="sort-select" class="sort-select">
            <option value="best">Best Match</option>
            <option value="score">Deal Score ↑</option>
            <option value="discount">Highest Discount</option>
            <option value="price-asc">Price: Low → High</option>
            <option value="price-desc">Price: High → Low</option>
          </select>
        </div>
      </div>

      <!-- Active filter tags -->
      <div class="active-filters" id="active-filters" style="display:none;">
        <span class="af-label">Active:</span>
        <div class="af-tags" id="af-tags"></div>
        <button class="af-clear" id="af-clear-all">Clear all</button>
      </div>

      <!-- Deals grid -->
      <div class="deals-grid" id="deals-grid"></div>

      <!-- Empty state -->
      <div class="empty-state" id="empty-state" style="display:none;">
        <div class="empty-icon">🔍</div>
        <h2>No deals found</h2>
        <p>Try adjusting your filters or search term.</p>
        <button class="btn-reset" id="btn-empty-reset">Reset Filters</button>
      </div>

    </main>

  </div>

  <script src="../js/theme.js"></script>
  <script src="../js/products.js"></script>
  <script src="../js/dashboard.js"></script>
</body>
</html>
