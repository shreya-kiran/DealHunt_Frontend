<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="DealHunt – Find the best deals across all platforms." />
  <title>DealHunt</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/theme.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      font-family: var(--font);
      background: var(--bg);
      color: var(--text-primary);
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      transition: opacity 0.55s ease;
    }

    body.fade-out { opacity: 0; }

    .splash {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2rem;
      animation: splashIn 0.6s ease both;
    }

    /* ── Spokes Spinner ── */
    @keyframes spokes-spin {
      to { transform: rotate(360deg); }
    }

    .spinner {
      width: 56px;
      height: 56px;
      color: var(--accent);
      animation: spokes-spin 1s linear infinite;
      filter: drop-shadow(0 0 12px var(--accent));
    }

    /* ── Logo / Wordmark ── */
    .wordmark {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 0.25rem;
    }

    .wordmark-text {
      font-size: 2rem;
      font-weight: 800;
      letter-spacing: -1px;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .wordmark-sub {
      font-size: 0.8rem;
      color: var(--text-muted);
      letter-spacing: 0.1em;
      text-transform: uppercase;
      font-weight: 500;
    }

    /* ── Loading dots ── */
    .loading-dots {
      display: flex;
      gap: 6px;
      align-items: center;
    }

    .loading-dots span {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--accent);
      opacity: 0.3;
      animation: dot-blink 1.2s infinite;
    }
    .loading-dots span:nth-child(2) { animation-delay: 0.2s; }
    .loading-dots span:nth-child(3) { animation-delay: 0.4s; }

    @keyframes dot-blink {
      0%, 80%, 100% { opacity: 0.3; }
      40%            { opacity: 1; }
    }

    @keyframes splashIn {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <div class="splash">
    <!-- Spokes SVG spinner -->
    <svg class="spinner" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path
        d="M12 2V6M16.2 7.8L19.1 4.9M18 12H22M16.2 16.2L19.1 19.1M12 18V22M4.9 19.1L7.8 16.2M2 12H6M4.9 4.9L7.8 7.8"
        stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
      />
    </svg>

    <div class="wordmark">
      <span class="wordmark-text">DealHunt</span>
      <span class="wordmark-sub">Hunt Smarter. Save Better.</span>
    </div>

    <div class="loading-dots">
      <span></span><span></span><span></span>
    </div>
  </div>

  <script src="../js/theme.js"></script>
  <script>
    // After 2s, fade out and redirect to login
    setTimeout(() => {
      document.body.classList.add('fade-out');
      setTimeout(() => {
        window.location.href = '../pages/login.html';
      }, 580);
    }, 2000);
  </script>
</body>
</html>
